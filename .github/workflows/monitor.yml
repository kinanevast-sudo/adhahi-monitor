name: 🐏 Adhahi Monitor

on:
  schedule:
    - cron: '*/1 7-22 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3          # ✅ زدنا الوقت إلى 3 دقائق بدلاً من 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install axios
      - name: Run monitor
        run: node scripts/monitor.js
